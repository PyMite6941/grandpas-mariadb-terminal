# Grandpa's MariaDB Terminal -- connection settings
#
# You can edit this file by hand, or let the setup script fill in the
# password for you (setup.bat on Windows, ./setup.sh on Linux/macOS).

# use_password toggles whether a password is sent at all:
#   true  -> use the "password" value below
#   false -> connect with no password (server set up without one)
use_password = true

host = "127.0.0.1"
port = 3306
user = "root"
password = ""        # your MariaDB password (used only when use_password = true)
charset = "utf8mb4"
